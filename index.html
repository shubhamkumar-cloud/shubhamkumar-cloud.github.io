<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎉 Happy Birthday!</title>
  <meta property="og:title" content="🎉 A surprise for you... tap to open!" />
  <meta property="og:description" content="Someone has a birthday message waiting for you 🎂" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 50%, #ff5e9c 100%);
      background-size: 300% 300%;
      animation: bgShift 12s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #fff;
      position: relative;
    }
    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .card {
      padding: 40px 28px;
      max-width: 90vw;
      z-index: 2;
      animation: popIn 0.9s cubic-bezier(.18,.89,.32,1.28);
    }
    @keyframes popIn {
      0% { transform: scale(0.3); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .cake { font-size: 80px; display: block; margin-bottom: 10px; animation: bob 2.5s ease-in-out infinite; }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
    .happy { font-size: clamp(28px, 7vw, 52px); font-weight: 800; letter-spacing: 1px; text-shadow: 0 4px 14px rgba(0,0,0,.25); }
    .name {
      font-size: clamp(40px, 12vw, 88px);
      font-weight: 900;
      margin: 6px 0 18px;
      background: linear-gradient(90deg, #fff700, #ffae00, #fff700);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 0 rgba(0,0,0,.05);
      animation: glow 2s ease-in-out infinite alternate;
      word-break: break-word;
    }
    @keyframes glow { from { filter: drop-shadow(0 0 6px rgba(255,247,0,.5)); } to { filter: drop-shadow(0 0 22px rgba(255,174,0,.9)); } }
    .msg { font-size: clamp(15px, 4vw, 20px); opacity: .95; line-height: 1.5; max-width: 460px; margin: 0 auto; }
    .confetti { position: absolute; top: -10px; width: 10px; height: 16px; opacity: .9; animation: fall linear infinite; z-index: 1; }
    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(720deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="cake">🎂</span>
    <div class="happy">Happy Birthday</div>
    <div class="name" id="name">Friend</div>
    <p class="msg" id="msg">Wishing you a day full of love, laughter, and cake! 🥳🎈<br/>Hope all your wishes come true this year. ❤️</p>
  </div>

  <script>
    // Read the name from the link: ?name=Riya  (or  ?to=Riya)
    const params = new URLSearchParams(window.location.search);
    let name = params.get('name') || params.get('to') || params.get('n') || '';
    name = decodeURIComponent(name).trim();
    if (name) {
      name = name.replace(/\b\w/g, c => c.toUpperCase());
      document.getElementById('name').textContent = name + '!';
      document.title = '🎉 Happy Birthday ' + name + '!';
    } else {
      document.getElementById('name').textContent = 'Friend!';
    }

    const colors = ['#ffd700','#ff5e9c','#00e5ff','#7CFC00','#ff8c00','#ffffff','#b388ff'];
    for (let i = 0; i < 70; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (3 + Math.random() * 4) + 's';
      c.style.animationDelay = (Math.random() * 5) + 's';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(c);
    }
  </script>
</body>
</html>
